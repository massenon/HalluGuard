# HalluGuard — Master Experiment Configuration
# All API keys are read from environment variables; never hardcode secrets.

llm:
  generator_model: "gpt-4-turbo-2024-04-09"
  judge_model: "claude-3-5-sonnet-20240620"     # cross-model: judge != generator
  generation_temperature: 0.2
  max_tokens: 512
  max_regeneration_attempts: 3                   # k in Algorithm 1

cross_model_judge:
  enabled: true
  fallback_pairs:
    - generator: "gpt-4-turbo-2024-04-09"
      judge: "claude-3-5-sonnet-20240620"
    - generator: "claude-3-opus-20240229"
      judge: "gpt-4-turbo-2024-04-09"
    - generator: "mistral-large-latest"
      judge: "llama-3-70b-instruct"               # open-source judge option

security:
  tau_secure: 0.70
  weights:
    w_vuln: 0.6
    w_rep: 0.2
    w_typo: 0.2
  vulnerability_db: "osv"                          # osv | github_advisory
  osv_snapshot_date: "2025-03-01"
  reputation_source: "libraries.io"
  typosquat_reference_list_size: 5000
  typosquat_refresh_interval_days: 30

registries:
  python: "https://pypi.org/pypi/{package}/json"
  javascript: "https://registry.npmjs.org/{package}"

sampling:
  runs_per_prompt: 54                              # 3 seeds x 18 temperature steps
  temperature_range: [0.0, 1.0]
  temperature_step: 0.1
  random_seeds: [42, 137, 2024]

dataset:
  tiers:
    - name: "HumanEval+"
      n: 164
    - name: "MBPP"
      n: 500
    - name: "CodeHaluEval"
      n: 1183
    - name: "NL-API (ours)"
      n: 2500

evaluation:
  adversarial_benchmark_size: 500
  human_annotated_gold_standard_size: 800
  scr_manual_sample_size: 400
  inter_rater_target_kappa: 0.80

statistics:
  significance_alpha: 0.05
  bonferroni_correction: true
  num_comparisons: 3
  bonferroni_alpha_adjusted: 0.0167
  confidence_level: 0.95
  ci_method: "wilson"

logging:
  level: "INFO"
  output_dir: "results/raw"
